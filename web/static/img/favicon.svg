<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Vocala favicon Vo">
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="18" y1="18" x2="50" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>
  <rect x="5" y="5" width="54" height="54" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <path d="M14 19 L22 45 C22.5 46.5 24.5 46.5 25 45 L33 19"
        fill="none"
        stroke="#f8fafc"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <circle cx="43" cy="32" r="10" fill="none" stroke="url(#accent)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="43" cy="32" r="2.3" fill="url(#accent)" opacity="0.9"/>
</svg>
