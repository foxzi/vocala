# Vocala Nginx reverse proxy configuration
#
# Quick start:
#   1. Copy this file to /etc/nginx/sites-available/vocala.conf
#   2. Replace YOUR_DOMAIN with your actual domain (e.g. voice.example.com)
#   3. Replace YOUR_PUBLIC_IP with your server's public IP
#   4. Set up TLS certificate (see below)
#   5. Enable: ln -s /etc/nginx/sites-available/vocala.conf /etc/nginx/sites-enabled/
#   6. Test: nginx -t
#   7. Reload: systemctl reload nginx
#
# TLS certificate options:
#   a) Let's Encrypt (recommended):
#      apt install certbot python3-certbot-nginx
#      certbot --nginx -d YOUR_DOMAIN
#
#   b) Self-signed (testing only):
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/ssl/vocala/selfsigned.key \
#        -out /etc/ssl/vocala/selfsigned.crt \
#        -subj "/CN=YOUR_DOMAIN"
#
# Vocala config.yaml should have:
#   server:
#     addr: "127.0.0.1:8090"
#   auth:
#     cookie_secure: true
#   turn:
#     enabled: true
#     ip: "YOUR_PUBLIC_IP"
#     tls_port: 5349              # optional: TURNS for mobile clients
#     tls_host: "YOUR_DOMAIN"     # must match TLS cert
#     cert_file: "/etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem"
#     key_file: "/etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem"
#
# Firewall (ufw):
#   ufw allow 80/tcp
#   ufw allow 443/tcp
#   ufw allow 3478/udp
#   ufw allow 5349/tcp    # if using TURNS
#   ufw allow 40000:40200/udp  # WebRTC media

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS certificate (update paths after certbot or self-signed setup)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Static files (served directly by Nginx for performance)
    location /static/ {
        alias /usr/share/vocala/web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket (signaling)
    location /ws {
        proxy_pass http://127.0.0.1:8090/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Application
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
